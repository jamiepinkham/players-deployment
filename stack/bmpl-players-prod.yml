# Billy Martin Players League - Production Stack
# Production Rails application with Postgres and Redis
#
# Services:
# - players-web: Rails web server
# - players-sidekiq: Background job processor (DISABLED - broken in :main image)
# - players-scheduler: Cron job scheduler
# - players-db: PostgreSQL database
# - players-redis: Redis cache
#
# Networks:
# - bmpl-prod: Internal network for database/redis communication
# - web: Shared network for Caddy reverse proxy (external)
#
# Prerequisites:
# - Infrastructure stack must be running (Caddy needs to proxy to players-web)
# - 'web' network must exist

version: '3.8'

services:
  # =============================================================================
  # Rails Web Server
  # =============================================================================
  players-web:
    image: ghcr.io/jamiepinkham/players:main
    container_name: players-web
    command: sh -c "yarn install && yarn build && yarn build:css && bundle exec rails assets:precompile && bin/rails server -b 0.0.0.0"
    environment:
      - APP_HOST=
      - ASSET_HOST=
      - DATABASE_HOST=players-db
      - DATABASE_NAME=players_production
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-}
      - DISABLE_FORCE_SSL=true
      - DISABLE_HOST_CHECK=true
      - MAILER_FROM=no-reply@billymartinplayersleague.com
      - MAILGUN_SMTP_ADDRESS=smtp.mailgun.org
      - MAILGUN_SMTP_AUTHENTICATION=plain
      - MAILGUN_SMTP_DOMAIN=billymartinplayersleague.com
      - MAILGUN_SMTP_PORT=587
      - MAILGUN_SMTP_USERNAME=${MAILGUN_SMTP_USERNAME}
      - MAILGUN_SMTP_PASSWORD=${MAILGUN_SMTP_PASSWORD}
      - RAILS_ENV=production
      - RAILS_LOG_TO_STDOUT=true
      - RAILS_SERVE_STATIC_FILES=true
      - REDIS_URL=${REDIS_URL:-redis://players-redis:6379/0}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - STATS_API_URL=${STATS_API_URL:-http://stats-api:3001}
    depends_on:
      players-db:
        condition: service_healthy
      players-redis:
        condition: service_healthy
    networks:
      - bmpl-prod
      - web
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =============================================================================
  # PostgreSQL Database
  # =============================================================================
  players-db:
    image: postgres:16
    container_name: players-db
    environment:
      - POSTGRES_DB=players_production
      - POSTGRES_USER=postgres
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - players_db_data:/var/lib/postgresql/data
    networks:
      - bmpl-prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================================================
  # Redis Cache
  # =============================================================================
  players-redis:
    image: redis:7-alpine
    container_name: players-redis
    networks:
      - bmpl-prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # =============================================================================
  # Sidekiq Background Jobs - DISABLED
  # =============================================================================
  # Removed from production due to broken Sidekiq in :main image
  # Background jobs will queue in Redis but won't process
  # Stats rely on database fallback (working correctly)
  # TODO: Re-enable when main branch Sidekiq is fixed

  # =============================================================================
  # Cron Scheduler
  # =============================================================================
  players-scheduler:
    image: ghcr.io/jamiepinkham/players:main
    container_name: players-scheduler
    environment:
      - APP_HOST=
      - ASSET_HOST=
      - DATABASE_HOST=players-db
      - DATABASE_NAME=players_production
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-}
      - DISABLE_FORCE_SSL=true
      - DISABLE_HOST_CHECK=true
      - MAILER_FROM=no-reply@billymartinplayersleague.com
      - MAILGUN_SMTP_ADDRESS=smtp.mailgun.org
      - MAILGUN_SMTP_AUTHENTICATION=plain
      - MAILGUN_SMTP_DOMAIN=billymartinplayersleague.com
      - MAILGUN_SMTP_PORT=587
      - MAILGUN_SMTP_USERNAME=${MAILGUN_SMTP_USERNAME}
      - MAILGUN_SMTP_PASSWORD=${MAILGUN_SMTP_PASSWORD}
      - RAILS_ENV=production
      - RAILS_LOG_TO_STDOUT=true
      - RAILS_SERVE_STATIC_FILES=true
      - REDIS_URL=${REDIS_URL:-redis://players-redis:6379/0}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - STATS_API_URL=${STATS_API_URL:-http://stats-api:3001}
    depends_on:
      players-db:
        condition: service_healthy
      players-redis:
        condition: service_healthy
    command: supercronic /app/config/crontab
    networks:
      - bmpl-prod
    restart: unless-stopped

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  bmpl-prod:
    external: true
    name: bmpl-prod
  web:
    external: true
    name: web

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  players_db_data:
    name: players_db_data
