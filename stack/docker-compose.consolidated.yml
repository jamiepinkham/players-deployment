# Billy Martin Players League - Consolidated Stack
# This single compose file manages ALL services:
# - Rails Production (players, sidekiq, scheduler)
# - Rails QA (players-qa, sidekiq-qa, scheduler-qa)
# - Ghost Blog + MySQL
# - Caddy (reverse proxy)
# - Cloudflare Tunnel
#
# Benefits of consolidation:
# - Single source of truth
# - No duplicate containers
# - Clear dependencies
# - Easier deployment
#
# Usage:
#   docker-compose -f docker-compose.consolidated.yml up -d
#   docker-compose -f docker-compose.consolidated.yml logs -f <service>
#   docker-compose -f docker-compose.consolidated.yml restart <service>

version: '3.8'

services:
  # =============================================================================
  # INFRASTRUCTURE - Caddy Reverse Proxy
  # =============================================================================
  caddy:
    image: caddy:latest
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================================================
  # INFRASTRUCTURE - Cloudflare Tunnel
  # =============================================================================
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - web
    restart: unless-stopped
    depends_on:
      - caddy

  # =============================================================================
  # PRODUCTION - Players Rails Application
  # =============================================================================
  players-web:
    image: ghcr.io/jamiepinkham/players:main
    container_name: players-web
    environment:
      - APP_HOST=
      - ASSET_HOST=
      - DATABASE_HOST=players-db
      - DATABASE_NAME=players_production
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-}
      - DISABLE_FORCE_SSL=true
      - DISABLE_HOST_CHECK=true
      - MAILER_FROM=no-reply@billymartinplayersleague.com
      - MAILGUN_SMTP_ADDRESS=smtp.mailgun.org
      - MAILGUN_SMTP_AUTHENTICATION=plain
      - MAILGUN_SMTP_DOMAIN=billymartinplayersleague.com
      - MAILGUN_SMTP_PORT=587
      - MAILGUN_SMTP_USERNAME=${MAILGUN_SMTP_USERNAME}
      - MAILGUN_SMTP_PASSWORD=${MAILGUN_SMTP_PASSWORD}
      - RAILS_ENV=production
      - RAILS_LOG_TO_STDOUT=true
      - RAILS_SERVE_STATIC_FILES=true
      - REDIS_URL=redis://players-redis:6379/0
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
    depends_on:
      players-db:
        condition: service_healthy
      players-redis:
        condition: service_healthy
    networks:
      - default
      - web
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  players-db:
    image: postgres:16
    container_name: players-db
    environment:
      - POSTGRES_DB=players_production
      - POSTGRES_USER=postgres
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - players_db_data:/var/lib/postgresql/data
    networks:
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  players-redis:
    image: redis:7-alpine
    container_name: players-redis
    networks:
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  players-sidekiq:
    image: ghcr.io/jamiepinkham/players:main
    container_name: players-sidekiq
    environment:
      - APP_HOST=
      - ASSET_HOST=
      - DATABASE_HOST=players-db
      - DATABASE_NAME=players_production
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-}
      - DISABLE_FORCE_SSL=true
      - DISABLE_HOST_CHECK=true
      - MAILER_FROM=no-reply@billymartinplayersleague.com
      - MAILGUN_SMTP_ADDRESS=smtp.mailgun.org
      - MAILGUN_SMTP_AUTHENTICATION=plain
      - MAILGUN_SMTP_DOMAIN=billymartinplayersleague.com
      - MAILGUN_SMTP_PORT=587
      - MAILGUN_SMTP_USERNAME=${MAILGUN_SMTP_USERNAME}
      - MAILGUN_SMTP_PASSWORD=${MAILGUN_SMTP_PASSWORD}
      - RAILS_ENV=production
      - RAILS_LOG_TO_STDOUT=true
      - REDIS_URL=redis://players-redis:6379/0
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
    depends_on:
      players-db:
        condition: service_healthy
      players-redis:
        condition: service_healthy
    command: bundle exec sidekiq
    networks:
      - default
    restart: unless-stopped

  players-scheduler:
    image: ghcr.io/jamiepinkham/players:main
    container_name: players-scheduler
    environment:
      - APP_HOST=
      - ASSET_HOST=
      - DATABASE_HOST=players-db
      - DATABASE_NAME=players_production
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-}
      - DISABLE_FORCE_SSL=true
      - DISABLE_HOST_CHECK=true
      - MAILER_FROM=no-reply@billymartinplayersleague.com
      - MAILGUN_SMTP_ADDRESS=smtp.mailgun.org
      - MAILGUN_SMTP_AUTHENTICATION=plain
      - MAILGUN_SMTP_DOMAIN=billymartinplayersleague.com
      - MAILGUN_SMTP_PORT=587
      - MAILGUN_SMTP_USERNAME=${MAILGUN_SMTP_USERNAME}
      - MAILGUN_SMTP_PASSWORD=${MAILGUN_SMTP_PASSWORD}
      - RAILS_ENV=production
      - RAILS_LOG_TO_STDOUT=true
      - RAILS_SERVE_STATIC_FILES=true
      - REDIS_URL=redis://players-redis:6379/0
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
    depends_on:
      players-db:
        condition: service_healthy
      players-redis:
        condition: service_healthy
    command: supercronic /app/config/crontab
    networks:
      - default
    restart: unless-stopped

  # =============================================================================
  # QA - Players Rails Application (Testing)
  # =============================================================================
  players-web-qa:
    image: ghcr.io/jamiepinkham/players:${GIT_REF:-main}
    container_name: players-web-qa
    environment:
      - APP_HOST=
      - ASSET_HOST=
      - DATABASE_HOST=players-db-qa
      - DATABASE_NAME=${DATABASE_NAME_QA:-players_qa}
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD_QA:-}
      - DISABLE_FORCE_SSL=true
      - DISABLE_HOST_CHECK=true
      - MAILER_FROM=no-reply@billymartinplayersleague.com
      - MAILGUN_SMTP_ADDRESS=smtp.mailgun.org
      - MAILGUN_SMTP_AUTHENTICATION=plain
      - MAILGUN_SMTP_DOMAIN=billymartinplayersleague.com
      - MAILGUN_SMTP_PORT=587
      - MAILGUN_SMTP_USERNAME=${MAILGUN_SMTP_USERNAME}
      - MAILGUN_SMTP_PASSWORD=${MAILGUN_SMTP_PASSWORD}
      - RAILS_ENV=production
      - RAILS_LOG_TO_STDOUT=true
      - RAILS_SERVE_STATIC_FILES=true
      - REDIS_URL=redis://players-redis-qa:6379/0
      - SECRET_KEY_BASE=${SECRET_KEY_BASE_QA:-${SECRET_KEY_BASE}}
    depends_on:
      players-db-qa:
        condition: service_healthy
      players-redis-qa:
        condition: service_healthy
    networks:
      - qa
      - web
    restart: unless-stopped

  players-db-qa:
    image: postgres:16
    container_name: players-db-qa
    environment:
      - POSTGRES_DB=${DATABASE_NAME_QA:-players_qa}
      - POSTGRES_USER=postgres
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - players_db_data_qa:/var/lib/postgresql/data
    networks:
      - qa
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  players-redis-qa:
    image: redis:7-alpine
    container_name: players-redis-qa
    networks:
      - qa
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  players-sidekiq-qa:
    image: ghcr.io/jamiepinkham/players:${GIT_REF:-main}
    container_name: players-sidekiq-qa
    environment:
      - APP_HOST=
      - ASSET_HOST=
      - DATABASE_HOST=players-db-qa
      - DATABASE_NAME=${DATABASE_NAME_QA:-players_qa}
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD_QA:-}
      - DISABLE_FORCE_SSL=true
      - DISABLE_HOST_CHECK=true
      - MAILER_FROM=no-reply@billymartinplayersleague.com
      - MAILGUN_SMTP_ADDRESS=smtp.mailgun.org
      - MAILGUN_SMTP_AUTHENTICATION=plain
      - MAILGUN_SMTP_DOMAIN=billymartinplayersleague.com
      - MAILGUN_SMTP_PORT=587
      - MAILGUN_SMTP_USERNAME=${MAILGUN_SMTP_USERNAME}
      - MAILGUN_SMTP_PASSWORD=${MAILGUN_SMTP_PASSWORD}
      - RAILS_ENV=production
      - RAILS_LOG_TO_STDOUT=true
      - REDIS_URL=redis://players-redis-qa:6379/0
      - SECRET_KEY_BASE=${SECRET_KEY_BASE_QA:-${SECRET_KEY_BASE}}
    depends_on:
      players-db-qa:
        condition: service_healthy
      players-redis-qa:
        condition: service_healthy
    command: bundle exec sidekiq
    networks:
      - qa
    restart: unless-stopped

  players-scheduler-qa:
    image: ghcr.io/jamiepinkham/players:${GIT_REF:-main}
    container_name: players-scheduler-qa
    environment:
      - APP_HOST=
      - ASSET_HOST=
      - DATABASE_HOST=players-db-qa
      - DATABASE_NAME=${DATABASE_NAME_QA:-players_qa}
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD_QA:-}
      - DISABLE_FORCE_SSL=true
      - DISABLE_HOST_CHECK=true
      - MAILER_FROM=no-reply@billymartinplayersleague.com
      - MAILGUN_SMTP_ADDRESS=smtp.mailgun.org
      - MAILGUN_SMTP_AUTHENTICATION=plain
      - MAILGUN_SMTP_DOMAIN=billymartinplayersleague.com
      - MAILGUN_SMTP_PORT=587
      - MAILGUN_SMTP_USERNAME=${MAILGUN_SMTP_USERNAME}
      - MAILGUN_SMTP_PASSWORD=${MAILGUN_SMTP_PASSWORD}
      - RAILS_ENV=production
      - RAILS_LOG_TO_STDOUT=true
      - RAILS_SERVE_STATIC_FILES=true
      - REDIS_URL=redis://players-redis-qa:6379/0
      - SECRET_KEY_BASE=${SECRET_KEY_BASE_QA:-${SECRET_KEY_BASE}}
    depends_on:
      players-db-qa:
        condition: service_healthy
      players-redis-qa:
        condition: service_healthy
    command: supercronic /app/config/crontab
    networks:
      - qa
    restart: unless-stopped

  # =============================================================================
  # GHOST BLOG - Database
  # =============================================================================
  ghost-db:
    image: mysql:8.0
    container_name: ghost-db
    environment:
      - MYSQL_ROOT_PASSWORD=${GHOST_DB_PASSWORD}
      - MYSQL_DATABASE=ghost
      - MYSQL_USER=ghost
      - MYSQL_PASSWORD=${GHOST_DB_PASSWORD}
    volumes:
      - ghost_db_data:/var/lib/mysql
    networks:
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =============================================================================
  # GHOST BLOG - Application
  # =============================================================================
  # IMPORTANT: Ghost mail configuration added to environment variables
  # to persist through container recreations
  ghost:
    image: ghost:latest
    container_name: ghost
    environment:
      # Ghost Core Config
      - url=https://billymartinplayersleague.com
      - NODE_ENV=production
      # Database
      - database__client=mysql
      - database__connection__host=ghost-db
      - database__connection__user=ghost
      - database__connection__password=${GHOST_DB_PASSWORD}
      - database__connection__database=ghost
      # Mail Configuration (Mailgun SMTP)
      - mail__transport=SMTP
      - mail__options__host=smtp.mailgun.org
      - mail__options__port=587
      - mail__options__secureConnection=false
      - mail__options__auth__user=${GHOST_MAIL_USER}
      - mail__options__auth__pass=${GHOST_MAIL_PASSWORD}
      - mail__from=${GHOST_MAIL_FROM}
    depends_on:
      ghost-db:
        condition: service_healthy
    volumes:
      - ghost_content:/var/lib/ghost/content
    networks:
      - default
      - web
    restart: unless-stopped
    # Health check disabled - Ghost doesn't include curl/wget
    # Ghost is monitored via external checks instead

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  default:
    name: players_default
    driver: bridge
  qa:
    name: players_qa
    driver: bridge
  web:
    external: true
    name: web

# =============================================================================
# VOLUMES
# =============================================================================
# Clean, logical volume names
# Migration guide provides steps to rename existing volumes to these names
volumes:
  # Production
  players_db_data:
    name: players_db_data

  # QA
  players_db_data_qa:
    name: players_db_data_qa

  # Ghost
  ghost_db_data:
    name: ghost_db_data

  ghost_content:
    name: ghost_content

  # Caddy
  caddy_data:
    name: caddy_data

  caddy_config:
    name: caddy_config

# =============================================================================
# CONFIGS
# =============================================================================
configs:
  caddyfile:
    content: |
      # Caddyfile for Cloudflare Tunnel
      # Explicitly set proxy headers for Ghost

      # Rails app (Production)
      http://players.billymartinplayersleague.com {
          reverse_proxy players-web:3000 {
              header_up X-Real-IP {remote_host}
              header_up X-Forwarded-For {remote_host}
              header_up X-Forwarded-Proto https
              header_up Host {host}
          }
      }

      # Rails app (QA - for testing branches)
      http://qa.billymartinplayersleague.com {
          reverse_proxy players-web-qa:3000 {
              header_up X-Real-IP {remote_host}
              header_up X-Forwarded-For {remote_host}
              header_up X-Forwarded-Proto https
              header_up Host {host}
          }
      }

      # Ghost blog
      http://billymartinplayersleague.com {
          reverse_proxy ghost:2368 {
              header_up X-Real-IP {remote_host}
              header_up X-Forwarded-For {remote_host}
              header_up X-Forwarded-Proto https
              header_up Host {host}
          }
      }
