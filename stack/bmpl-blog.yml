# Billy Martin Players League - Ghost Blog Stack
# League website and blog powered by Ghost CMS
#
# Services:
# - ghost: Ghost CMS application
# - ghost-db: MySQL database for Ghost
#
# Networks:
# - bmpl-blog: Internal network for database communication
# - web: Shared network for Caddy reverse proxy (external)
#
# Prerequisites:
# - Infrastructure stack must be running (Caddy needs to proxy to ghost)
# - 'web' network must exist

version: '3.8'

services:
  # =============================================================================
  # MySQL Database for Ghost
  # =============================================================================
  ghost-db:
    image: mysql:8.0
    container_name: ghost-db
    environment:
      - MYSQL_ROOT_PASSWORD=${GHOST_DB_PASSWORD}
      - MYSQL_DATABASE=ghost
      - MYSQL_USER=ghost
      - MYSQL_PASSWORD=${GHOST_DB_PASSWORD}
    volumes:
      - ghost_db_data:/var/lib/mysql
    networks:
      - bmpl-blog
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =============================================================================
  # Ghost CMS Application
  # =============================================================================
  # IMPORTANT: Ghost mail configuration added to environment variables
  # to persist through container recreations
  ghost:
    image: ghost:latest
    container_name: ghost
    environment:
      # Ghost Core Config
      - url=https://billymartinplayersleague.com
      - NODE_ENV=production
      # Database
      - database__client=mysql
      - database__connection__host=ghost-db
      - database__connection__user=ghost
      - database__connection__password=${GHOST_DB_PASSWORD}
      - database__connection__database=ghost
      # Mail Configuration (Mailgun SMTP)
      - mail__transport=SMTP
      - mail__options__host=smtp.mailgun.org
      - mail__options__port=587
      - mail__options__secureConnection=false
      - mail__options__auth__user=${GHOST_MAIL_USER}
      - mail__options__auth__pass=${GHOST_MAIL_PASSWORD}
      - mail__from=${GHOST_MAIL_FROM}
    depends_on:
      ghost-db:
        condition: service_healthy
    volumes:
      - ghost_content:/var/lib/ghost/content
    networks:
      - bmpl-blog
      - web
    restart: unless-stopped
    # Health check disabled - Ghost doesn't include curl/wget
    # Ghost is monitored via external checks instead

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  bmpl-blog:
    external: true
    name: bmpl-blog
  web:
    external: true
    name: web

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  ghost_db_data:
    name: ghost_db_data

  ghost_content:
    name: ghost_content
