version: '3.8'

services:
  # Players Rails Application (Integration)
  players-web-integration:
    image: ghcr.io/jamiepinkham/players:${INTEGRATION_REF:-main}
    container_name: players-web-integration
    environment:
      - APP_HOST=
      - ASSET_HOST=
      - DATABASE_HOST=players-db-integration
      - DATABASE_NAME=players_integration
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-}
      - DISABLE_FORCE_SSL=true
      - DISABLE_HOST_CHECK=true
      - MAILER_FROM=no-reply@billymartinplayersleague.com
      - MAILGUN_SMTP_ADDRESS=smtp.mailgun.org
      - MAILGUN_SMTP_AUTHENTICATION=plain
      - MAILGUN_SMTP_DOMAIN=billymartinplayersleague.com
      - MAILGUN_SMTP_PORT=587
      - MAILGUN_SMTP_USERNAME=${MAILGUN_SMTP_USERNAME}
      - MAILGUN_SMTP_PASSWORD=${MAILGUN_SMTP_PASSWORD}
      - RAILS_ENV=development
      - RAILS_LOG_TO_STDOUT=true
      - RAILS_SERVE_STATIC_FILES=true
      - REDIS_URL=redis://players-redis-integration:6379/0
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
    depends_on:
      - players-db-integration
      - players-redis-integration
    ports:
      - "3001:3000"  # Integration on different port
    networks:
      - integration
      - web
    restart: unless-stopped

  # Players Database (Integration)
  players-db-integration:
    image: postgres:16
    container_name: players-db-integration
    environment:
      - POSTGRES_DB=players_integration
      - POSTGRES_USER=postgres
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - players-db-data-integration:/var/lib/postgresql/data
    networks:
      - integration
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Players Scheduler (Integration)
  players-scheduler-integration:
    image: ghcr.io/jamiepinkham/players:${INTEGRATION_REF:-main}
    container_name: players-scheduler-integration
    environment:
      - APP_HOST=
      - ASSET_HOST=
      - DATABASE_HOST=players-db-integration
      - DATABASE_NAME=players_integration
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-}
      - DISABLE_FORCE_SSL=true
      - DISABLE_HOST_CHECK=true
      - MAILER_FROM=no-reply@billymartinplayersleague.com
      - MAILGUN_SMTP_ADDRESS=smtp.mailgun.org
      - MAILGUN_SMTP_AUTHENTICATION=plain
      - MAILGUN_SMTP_DOMAIN=billymartinplayersleague.com
      - MAILGUN_SMTP_PORT=587
      - MAILGUN_SMTP_USERNAME=${MAILGUN_SMTP_USERNAME}
      - MAILGUN_SMTP_PASSWORD=${MAILGUN_SMTP_PASSWORD}
      - RAILS_ENV=development
      - RAILS_LOG_TO_STDOUT=true
      - RAILS_SERVE_STATIC_FILES=true
      - REDIS_URL=redis://players-redis-integration:6379/0
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
    depends_on:
      - players-db-integration
      - players-redis-integration
    command: supercronic /app/config/crontab
    networks:
      - integration
    restart: unless-stopped

  # Redis (Integration)
  players-redis-integration:
    image: redis:7-alpine
    container_name: players-redis-integration
    networks:
      - integration
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Sidekiq Workers (Integration)
  players-sidekiq-integration:
    image: ghcr.io/jamiepinkham/players:${INTEGRATION_REF:-main}
    container_name: players-sidekiq-integration
    environment:
      - APP_HOST=
      - ASSET_HOST=
      - DATABASE_HOST=players-db-integration
      - DATABASE_NAME=players_integration
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-}
      - DISABLE_FORCE_SSL=true
      - DISABLE_HOST_CHECK=true
      - MAILER_FROM=no-reply@billymartinplayersleague.com
      - MAILGUN_SMTP_ADDRESS=smtp.mailgun.org
      - MAILGUN_SMTP_AUTHENTICATION=plain
      - MAILGUN_SMTP_DOMAIN=billymartinplayersleague.com
      - MAILGUN_SMTP_PORT=587
      - MAILGUN_SMTP_USERNAME=${MAILGUN_SMTP_USERNAME}
      - MAILGUN_SMTP_PASSWORD=${MAILGUN_SMTP_PASSWORD}
      - RAILS_ENV=development
      - RAILS_LOG_TO_STDOUT=true
      - REDIS_URL=redis://players-redis-integration:6379/0
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
    depends_on:
      - players-db-integration
      - players-redis-integration
    command: bundle exec sidekiq
    networks:
      - integration
    restart: unless-stopped

networks:
  integration:
    name: players_integration
  web:
    external: true
    name: web

volumes:
  players-db-data-integration:
