version: '3.8'

services:
  # Players Rails Application (QA)
  players-web-qa:
    image: ghcr.io/jamiepinkham/players:sha-${QA_SHA:-main}
    container_name: players-web-qa
    environment:
      - APP_HOST=
      - ASSET_HOST=
      - DATABASE_HOST=players-db-qa
      - DATABASE_NAME=players_qa
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-}
      - DISABLE_FORCE_SSL=true
      - DISABLE_HOST_CHECK=true
      - MAILER_FROM=no-reply@billymartinplayersleague.com
      - MAILGUN_SMTP_ADDRESS=smtp.mailgun.org
      - MAILGUN_SMTP_AUTHENTICATION=plain
      - MAILGUN_SMTP_DOMAIN=billymartinplayersleague.com
      - MAILGUN_SMTP_PORT=587
      - MAILGUN_SMTP_USERNAME=${MAILGUN_SMTP_USERNAME}
      - MAILGUN_SMTP_PASSWORD=${MAILGUN_SMTP_PASSWORD}
      - RAILS_ENV=development
      - RAILS_LOG_TO_STDOUT=true
      - RAILS_SERVE_STATIC_FILES=true
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
    depends_on:
      - players-db-qa
    ports:
      - "3001:3000"  # QA on different port
    networks:
      - qa
      - web
    restart: unless-stopped

  # Players Database (QA)
  players-db-qa:
    image: postgres:16
    container_name: players-db-qa
    environment:
      - POSTGRES_DB=players_qa
      - POSTGRES_USER=postgres
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - players-db-data-qa:/var/lib/postgresql/data
    networks:
      - qa
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Players Scheduler (QA)
  players-scheduler-qa:
    image: ghcr.io/jamiepinkham/players:sha-${QA_SHA:-main}
    container_name: players-scheduler-qa
    environment:
      - APP_HOST=
      - ASSET_HOST=
      - DATABASE_HOST=players-db-qa
      - DATABASE_NAME=players_qa
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-}
      - DISABLE_FORCE_SSL=true
      - DISABLE_HOST_CHECK=true
      - MAILER_FROM=no-reply@billymartinplayersleague.com
      - MAILGUN_SMTP_ADDRESS=smtp.mailgun.org
      - MAILGUN_SMTP_AUTHENTICATION=plain
      - MAILGUN_SMTP_DOMAIN=billymartinplayersleague.com
      - MAILGUN_SMTP_PORT=587
      - MAILGUN_SMTP_USERNAME=${MAILGUN_SMTP_USERNAME}
      - MAILGUN_SMTP_PASSWORD=${MAILGUN_SMTP_PASSWORD}
      - RAILS_ENV=development
      - RAILS_LOG_TO_STDOUT=true
      - RAILS_SERVE_STATIC_FILES=true
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
    depends_on:
      - players-db-qa
    command: supercronic /app/config/crontab
    networks:
      - qa
    restart: unless-stopped

networks:
  qa:
    name: players_qa
  web:
    external: true
    name: web

volumes:
  players-db-data-qa:
