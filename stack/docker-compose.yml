version: '3.8'

services:
  # Players Rails Application
  players-web:
    image: ghcr.io/jamiepinkham/players:main
    container_name: players-players-1
    environment:
      - APP_HOST=
      - ASSET_HOST=
      - DATABASE_HOST=players-db-1
      - DATABASE_NAME=players_production
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - DISABLE_FORCE_SSL=true
      - DISABLE_HOST_CHECK=true
      - MAILER_FROM=no-reply@billymartinplayersleague.com
      - MAILGUN_SMTP_ADDRESS=smtp.mailgun.org
      - MAILGUN_SMTP_AUTHENTICATION=plain
      - MAILGUN_SMTP_DOMAIN=billymartinplayersleague.com
      - MAILGUN_SMTP_PORT=587
      - MAILGUN_SMTP_USERNAME=${MAILGUN_SMTP_USERNAME}
      - MAILGUN_SMTP_PASSWORD=${MAILGUN_SMTP_PASSWORD}
      - RAILS_ENV=production
      - RAILS_LOG_TO_STDOUT=true
      - RAILS_SERVE_STATIC_FILES=true
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
    depends_on:
      - players-db
    ports:
      - "3000:3000"
    networks:
      - default
      - web
    restart: unless-stopped

  # Players Database
  players-db:
    image: postgres:16
    container_name: players-db-1
    environment:
      - POSTGRES_DB=players_production
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - players-db-data:/var/lib/postgresql/data
    networks:
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Players Scheduler (Background Jobs)
  players-scheduler:
    image: ghcr.io/jamiepinkham/players:main
    container_name: players-scheduler-1
    environment:
      - APP_HOST=
      - ASSET_HOST=
      - DATABASE_HOST=players-db-1
      - DATABASE_NAME=players_production
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - DISABLE_FORCE_SSL=true
      - DISABLE_HOST_CHECK=true
      - MAILER_FROM=no-reply@billymartinplayersleague.com
      - MAILGUN_SMTP_ADDRESS=smtp.mailgun.org
      - MAILGUN_SMTP_AUTHENTICATION=plain
      - MAILGUN_SMTP_DOMAIN=billymartinplayersleague.com
      - MAILGUN_SMTP_PORT=587
      - MAILGUN_SMTP_USERNAME=${MAILGUN_SMTP_USERNAME}
      - MAILGUN_SMTP_PASSWORD=${MAILGUN_SMTP_PASSWORD}
      - RAILS_ENV=production
      - RAILS_LOG_TO_STDOUT=true
      - RAILS_SERVE_STATIC_FILES=true
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
    depends_on:
      - players-db
    command: bundle exec whenever --update-crontab && cron -f
    networks:
      - default
    restart: unless-stopped

  # Ghost Blog Database
  ghost-db:
    image: mysql:8.0
    container_name: ghost-db
    environment:
      - MYSQL_ROOT_PASSWORD=${GHOST_DB_PASSWORD}
      - MYSQL_DATABASE=ghost
      - MYSQL_USER=ghost
      - MYSQL_PASSWORD=${GHOST_DB_PASSWORD}
    volumes:
      - ghost-db-data:/var/lib/mysql
    networks:
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ghost Blog
  ghost:
    image: ghost:latest
    container_name: ghost
    environment:
      - url=https://billymartinplayersleague.com
      - NODE_ENV=production
      - database__client=mysql
      - database__connection__host=ghost-db
      - database__connection__user=ghost
      - database__connection__password=${GHOST_DB_PASSWORD}
      - database__connection__database=ghost
    depends_on:
      - ghost-db
    volumes:
      - ghost-content:/var/lib/ghost/content
    networks:
      - default
      - web
    restart: unless-stopped

networks:
  default:
    name: players_default
  web:
    external: true
    name: web

volumes:
  players-db-data:
  ghost-db-data:
  ghost-content:
